<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0f14">
<meta name="description" content="Crown Tracker - Dental Design & Payment Management">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CrownTracker">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Crown Tracker</title>
<style>
:root{
  --bg:#0d0f14;--bg2:#13161e;--card:#181c27;--hover:#1e2333;
  --border:#252a3a;--accent:#4f8ef7;--aglow:rgba(79,142,247,.18);
  --text:#e8ecf4;--muted:#8892a4;--dim:#4a5268;
  --blue:#3a6fd8;--blue2:#2255c0;
  --green:#1a9e6e;--green2:#137a54;
  --purple:#7b3fc4;--purple2:#5e2fa0;
  --orange:#d4620a;--orange2:#b04f06;
  --red:#e74c3c;--gold:#f5c842;
  --r:14px;--rs:8px;
  --font:system-ui,-apple-system,'Segoe UI',sans-serif;
}
.light{--bg:#f0f2f8;--bg2:#e4e8f4;--card:#fff;--hover:#f0f4ff;--border:#d0d6ec;--text:#1a2040;--muted:#4a5578;--dim:#8892a4;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}
.hidden{display:none!important;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg2);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ── LOGIN ── */
#loginPage{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--bg);}
.login-logo{display:flex;flex-direction:column;align-items:center;margin-bottom:36px;}
.logo-icon{width:72px;height:72px;background:linear-gradient(135deg,#3a6fd8,#7b3fc4);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:14px;box-shadow:0 8px 32px rgba(58,111,216,.35);}
.login-logo h1{font-size:34px;font-weight:900;background:linear-gradient(135deg,#4f8ef7,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.login-logo p{color:var(--muted);font-size:12px;letter-spacing:1.8px;text-transform:uppercase;margin-top:4px;}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:32px;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(0,0,0,.4);}
.login-box h2{font-size:18px;font-weight:700;margin-bottom:22px;text-align:center;color:var(--text);}
.fg{margin-bottom:16px;}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px;}
.fg input,.fg select,.fg textarea{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:11px 14px;color:var(--text);font-size:14px;font-family:var(--font);transition:all .25s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--aglow);}
.btn{display:inline-flex;align-items:center;gap:7px;padding:11px 18px;border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .25s;font-family:var(--font);}
.btn:hover{transform:translateY(-1px);}
.btn-full{width:100%;justify-content:center;}
.btn-primary{background:linear-gradient(135deg,#3a6fd8,#7b3fc4);color:#fff;box-shadow:0 4px 18px rgba(58,111,216,.3);}
.btn-secondary{background:var(--hover);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{border-color:var(--accent);}
.btn-danger{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;}
.btn-success{background:linear-gradient(135deg,#1a9e6e,#137a54);color:#fff;}
.btn-gold{background:linear-gradient(135deg,#f5c842,#e6a817);color:#1a1a1a;}
.btn-sm{padding:7px 12px;font-size:12px;}
.btn-back{background:var(--hover);color:var(--muted);border:1px solid var(--border);padding:7px 14px;border-radius:var(--rs);font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .25s;font-family:var(--font);}
.btn-back:hover{border-color:var(--accent);color:var(--accent);}
.login-err{color:var(--red);font-size:13px;text-align:center;margin-top:12px;padding:10px;background:rgba(231,76,60,.1);border-radius:var(--rs);border:1px solid rgba(231,76,60,.25);}
.remember-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:12px;color:var(--muted);cursor:pointer;}
.remember-row input{width:15px;height:15px;cursor:pointer;}

/* pending badge on login */
.pending-note{margin-top:14px;padding:10px 14px;background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.25);border-radius:var(--rs);font-size:12px;color:var(--gold);text-align:center;}

/* ── APP ── */
#appPage{display:flex;flex-direction:column;min-height:100vh;}
.top-bar{background:var(--card);border-bottom:1px solid var(--border);padding:0 22px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.tb-logo{display:flex;align-items:center;gap:10px;}
.logo-sm{width:30px;height:30px;background:linear-gradient(135deg,#3a6fd8,#7b3fc4);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.tb-logo span{font-weight:800;font-size:15px;}
.tb-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.user-badge{display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:5px 12px;font-size:12px;}
.badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
.badge-owner{background:linear-gradient(135deg,#f5c842,#e6a817);color:#1a1a1a;}
.badge-admin{background:linear-gradient(135deg,#3a6fd8,#7b3fc4);color:#fff;}
.badge-user{background:linear-gradient(135deg,#1a9e6e,#137a54);color:#fff;}
.icon-btn{width:34px;height:34px;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;font-size:15px;}
.icon-btn:hover{border-color:var(--accent);background:var(--aglow);}
.app-body{display:flex;flex:1;}
.sidebar{width:210px;background:var(--bg2);border-right:1px solid var(--border);padding:14px 0;display:flex;flex-direction:column;position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto;flex-shrink:0;}
.nav-label{font-size:10px;font-weight:700;color:var(--dim);letter-spacing:1.2px;text-transform:uppercase;padding:8px 18px 4px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 14px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);transition:all .25s;margin:0 7px 1px;border-radius:var(--rs);}
.nav-item:hover{background:var(--hover);color:var(--text);}
.nav-item.active{background:var(--aglow);color:var(--accent);}
.ni-icon{font-size:15px;width:20px;text-align:center;}
.main-content{flex:1;padding:22px;overflow-y:auto;}

/* ── COLORFUL STAT CARDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:22px;}
.stat-card{border-radius:16px;padding:22px 24px;color:#fff;position:relative;overflow:hidden;cursor:default;transition:transform .25s,box-shadow .25s;}
.stat-card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.35);}
.stat-card::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.1);}
.stat-card::after{content:'';position:absolute;bottom:-30px;left:-10px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.06);}
.sc-icon{font-size:22px;width:42px;height:42px;background:rgba(255,255,255,.2);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:18px;}
.sc-label{font-size:11px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;opacity:.85;margin-bottom:8px;}
.sc-value{font-size:32px;font-weight:900;line-height:1;}
.sc-sub{font-size:12px;opacity:.75;margin-top:6px;}
.sc-blue{background:linear-gradient(135deg,#3a6fd8,#2255c0);}
.sc-green{background:linear-gradient(135deg,#1a9e6e,#0e7a52);}
.sc-purple{background:linear-gradient(135deg,#7b3fc4,#5e2fa0);}
.sc-orange{background:linear-gradient(135deg,#d4620a,#b04f06);}
.sc-gold{background:linear-gradient(135deg,#c9900a,#a07206);}
.sc-red{background:linear-gradient(135deg,#c0392b,#96281b);}
.sc-teal{background:linear-gradient(135deg,#0a8fa0,#066b78);}
.sc-pink{background:linear-gradient(135deg,#b0276e,#8c1d57);}

/* ── CARDS / TABLE ── */
.page-header{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.page-title{font-size:17px;font-weight:800;}
.page-actions{margin-left:auto;display:flex;gap:8px;}
.greeting-card{background:linear-gradient(135deg,#1e2a4a,#2a1e4a);border:1px solid rgba(79,142,247,.25);border-radius:var(--r);padding:26px 30px;margin-bottom:22px;}
.greeting-card h2{font-size:20px;font-weight:800;margin-bottom:5px;}
.greeting-card p{color:var(--muted);font-size:13px;}
.role-tag{display:inline-flex;align-items:center;gap:5px;margin-top:10px;padding:4px 12px;background:var(--aglow);border:1px solid rgba(79,142,247,.3);border-radius:20px;font-size:11px;font-weight:700;color:var(--accent);}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:18px;}
.card-title{font-size:14px;font-weight:800;margin-bottom:14px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.section-title{font-size:15px;font-weight:800;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead tr{background:var(--bg2);}
th{padding:11px 14px;text-align:left;font-size:10px;font-weight:800;color:var(--dim);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);}
td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;}
tr:hover td{background:var(--hover);}
tr:last-child td{border-bottom:none;}
.td-code{font-family:monospace;background:var(--bg2);padding:2px 8px;border-radius:4px;font-size:11px;color:var(--accent);}
.qa-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;}
.qa-btn{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 10px;text-align:center;cursor:pointer;transition:all .25s;}
.qa-btn:hover{border-color:var(--accent);background:var(--aglow);transform:translateY(-2px);}
.qa-icon{font-size:22px;margin-bottom:7px;}
.qa-label{font-size:11px;font-weight:700;color:var(--muted);}
.qa-btn:hover .qa-label{color:var(--accent);}
.two-panel{display:grid;grid-template-columns:1fr 280px;gap:18px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(4px);}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:26px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.5);}
.modal-title{font-size:16px;font-weight:800;margin-bottom:18px;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border);}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.team-list{display:flex;flex-direction:column;gap:7px;}
.team-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;transition:all .25s;}
.team-item:hover{border-color:var(--accent);}
.ti-name{font-weight:700;font-size:12px;}.ti-role{font-size:10px;color:var(--dim);}
.log-entry{padding:11px;border-bottom:1px solid var(--border);font-size:11px;}
.log-entry:last-child{border-bottom:none;}
.log-time{color:var(--dim);font-size:10px;}
.log-action{font-weight:700;color:var(--accent);margin-top:2px;}
.license-key{font-family:monospace;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;font-size:12px;color:var(--gold);letter-spacing:2px;word-break:break-all;}
.upload-area{border:2px dashed var(--border);border-radius:var(--rs);padding:5px 9px;text-align:center;cursor:pointer;transition:all .25s;font-size:11px;color:var(--muted);display:inline-block;}
.upload-area:hover{border-color:var(--accent);color:var(--accent);background:var(--aglow);}
.alert{padding:10px 14px;border-radius:var(--rs);font-size:12px;margin-bottom:14px;}
.alert-info{background:var(--aglow);border:1px solid rgba(79,142,247,.3);color:var(--accent);}
.alert-success{background:rgba(26,158,110,.1);border:1px solid rgba(26,158,110,.3);color:#1a9e6e;}
.alert-warn{background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.25);color:var(--gold);}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;}
.dot-green{background:#1a9e6e;}.dot-red{background:var(--red);}.dot-yellow{background:var(--gold);}
.status-pill{display:inline-flex;align-items:center;padding:2px 10px;border-radius:20px;font-size:10px;font-weight:700;}
.pill-active{background:rgba(26,158,110,.15);color:#1a9e6e;border:1px solid rgba(26,158,110,.3);}
.pill-suspended{background:rgba(231,76,60,.15);color:var(--red);border:1px solid rgba(231,76,60,.3);}
.pill-pending{background:rgba(245,200,66,.1);color:var(--gold);border:1px solid rgba(245,200,66,.3);}
footer{background:var(--bg2);border-top:1px solid var(--border);padding:10px 22px;text-align:center;font-size:11px;color:var(--dim);display:flex;align-items:center;justify-content:center;gap:7px;}
.mky{font-weight:800;color:var(--accent);}
@media(max-width:860px){.two-panel{grid-template-columns:1fr;}.sidebar{display:none;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-logo">
    <div class="logo-icon">🦷</div>
    <h1>Crown Tracker</h1>
    <p>Dental Design &amp; Payment Management</p>
  </div>
  <div class="login-box">
    <h2>🔐 Sign In</h2>
    <div class="fg"><label>Username / Email</label><input type="text" id="loginUser" placeholder="Enter username or email"/></div>
    <div class="fg"><label>Password</label><input type="password" id="loginPass" placeholder="Enter password"/></div>
    <label class="remember-row"><input type="checkbox" id="rememberMe" checked/> Keep me signed in</label>
    <button class="btn btn-primary btn-full" onclick="doLogin()">Sign In</button>
    <div id="loginErr" class="login-err hidden"></div>
    <div id="pendingNote" class="pending-note hidden">⏳ Your account is pending Owner approval. Please wait.</div>
  </div>
</div>

<!-- APP -->
<div id="appPage" class="hidden">
  <div class="top-bar">
    <div class="tb-logo"><div class="logo-sm">🦷</div><span>Crown Tracker</span></div>
    <div class="tb-right">
      <div class="user-badge"><span id="tbName" style="font-weight:700"></span><span class="badge" id="tbRole"></span></div>
      <div class="icon-btn" onclick="toggleTheme()" title="Toggle Theme">🌓</div>
      <div class="icon-btn" onclick="doLogout()" title="Logout">🚪</div>
    </div>
  </div>
  <div class="app-body">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-content" id="mainContent"></div>
  </div>
  <footer><span>🦷</span><span>Developed by <span class="mky">Marvan Yaftally</span></span><span>|</span><span class="mky">MKY</span><span>|</span><span>v2.0</span></footer>
</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle"></div>
    <div id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────
let DB={
  users:[{id:'u0',fullName:'Marvan Yaftally',username:'developermarvan@outlook.com',password:'marvan@1234',role:'owner',status:'active',joinDate:'2024-01-01',lastLogin:null}],
  designs:[],payments:[],auditLog:[],settings:{designRate:40},deletionRequests:[]
};
let currentUser=null,currentView='dashboard',viewHistory=[],isDark=true;

function saveDB(){try{localStorage.setItem('crownDB2',JSON.stringify(DB));}catch(e){}}
function loadDB(){try{const s=localStorage.getItem('crownDB2');if(s){const d=JSON.parse(s);DB=Object.assign({users:[],designs:[],payments:[],auditLog:[],settings:{designRate:40},deletionRequests:[]},d);}}catch(e){}}
loadDB();

// ── SESSION ───────────────────────────────────────────────
function saveSession(){try{localStorage.setItem('crownSess2',JSON.stringify({userId:currentUser?.id,isDark}));}catch(e){}}
function clearSession(){try{localStorage.removeItem('crownSess2');}catch(e){}}
function restoreSession(){
  try{const s=localStorage.getItem('crownSess2');if(!s)return false;
    const{userId,isDark:d}=JSON.parse(s);const u=DB.users.find(x=>x.id===userId);
    if(!u||u.status!=='active')return false;
    currentUser=u;isDark=d!==false;document.body.classList.toggle('light',!isDark);return true;
  }catch(e){return false;}
}

// ── UTILS ─────────────────────────────────────────────────
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function fmtDate(iso){if(!iso)return'-';return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}
function fmtTime(iso){if(!iso)return'-';return new Date(iso).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});}
function addAudit(action,details=''){DB.auditLog.unshift({id:uid(),timestamp:new Date().toISOString(),user:currentUser?.fullName||'System',role:currentUser?.role||'system',action,details});if(DB.auditLog.length>500)DB.auditLog=DB.auditLog.slice(0,500);saveDB();}

// ── AUTH ──────────────────────────────────────────────────
function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value.trim();
  const err=document.getElementById('loginErr'),pn=document.getElementById('pendingNote');
  err.classList.add('hidden');pn.classList.add('hidden');
  if(!u||!p){err.textContent='Please enter username and password.';err.classList.remove('hidden');return;}
  const found=DB.users.find(x=>x.username===u&&x.password===p);
  if(!found){err.textContent='Invalid username or password.';err.classList.remove('hidden');return;}
  if(found.status==='suspended'){err.textContent='Account suspended. Contact the Owner.';err.classList.remove('hidden');return;}
  if(found.status==='pending'){pn.classList.remove('hidden');return;}
  found.lastLogin=new Date().toISOString();currentUser=found;saveDB();
  if(document.getElementById('rememberMe').checked)saveSession();
  addAudit('LOGIN',found.fullName+' logged in');showApp();
}

function doLogout(){
  addAudit('LOGOUT',currentUser?.fullName+' logged out');
  currentUser=null;viewHistory=[];clearSession();
  document.getElementById('appPage').classList.add('hidden');
  document.getElementById('loginPage').classList.remove('hidden');
  ['loginUser','loginPass'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('loginErr').classList.add('hidden');
  document.getElementById('pendingNote').classList.add('hidden');
}

function showApp(){
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('appPage').classList.remove('hidden');
  renderTopBar();renderSidebar();navigateTo('dashboard');
}

// ── TOP BAR ───────────────────────────────────────────────
function renderTopBar(){
  document.getElementById('tbName').textContent=currentUser.fullName;
  const rb=document.getElementById('tbRole');
  rb.textContent=currentUser.role.charAt(0).toUpperCase()+currentUser.role.slice(1);
  rb.className='badge badge-'+currentUser.role;
}
function toggleTheme(){isDark=!isDark;document.body.classList.toggle('light',!isDark);saveSession();}

// ── SIDEBAR ───────────────────────────────────────────────
function renderSidebar(){
  const r=currentUser.role;
  const nav=r==='owner'?[
    {s:'Workspace'},{icon:'🏠',label:'Dashboard',view:'dashboard'},{icon:'✏️',label:'My Designs',view:'myDesigns'},{icon:'💰',label:'My Earnings',view:'myEarnings'},
    {s:'Management'},{icon:'👥',label:'Users',view:'users'},{icon:'📋',label:'All Designs',view:'allDesigns'},{icon:'💳',label:'Payments',view:'payments'},{icon:'📊',label:'Reports',view:'reports'},
    {s:'System'},{icon:'⚙️',label:'Settings',view:'settings'},{icon:'🔍',label:'Audit Log',view:'audit'}
  ]:r==='admin'?[
    {s:'Workspace'},{icon:'🏠',label:'Dashboard',view:'dashboard'},{icon:'📋',label:'Design Records',view:'allDesigns'},{icon:'💳',label:'Payments',view:'payments'},
    {s:'Management'},{icon:'👥',label:'Users',view:'users'},{icon:'📊',label:'Reports',view:'reports'},{icon:'✅',label:'Approvals',view:'approvals'}
  ]:[
    {s:'My Space'},{icon:'🏠',label:'Dashboard',view:'dashboard'},{icon:'✏️',label:'My Designs',view:'myDesigns'},{icon:'💰',label:'My Earnings',view:'myEarnings'},{icon:'📊',label:'Reports',view:'reports'}
  ];
  document.getElementById('sidebar').innerHTML=nav.map(it=>it.s?`<div class="nav-label">${it.s}</div>`:`<div class="nav-item ${currentView===it.view?'active':''}" onclick="navigateTo('${it.view}')"><span class="ni-icon">${it.icon}</span>${it.label}</div>`).join('');
}

// ── NAV ───────────────────────────────────────────────────
function navigateTo(view,push=true){
  if(push&&currentView&&currentView!==view)viewHistory.push(currentView);
  if(viewHistory.length>20)viewHistory=viewHistory.slice(-20);
  currentView=view;renderSidebar();
  const views={dashboard:renderDashboard,myDesigns:renderMyDesigns,myEarnings:renderMyEarnings,users:renderUsers,allDesigns:renderAllDesigns,payments:renderPayments,reports:renderReports,settings:renderSettings,audit:renderAudit,approvals:renderApprovals};
  if(views[view])views[view]();
}
function goBack(){if(!viewHistory.length){navigateTo('dashboard',false);return;}navigateTo(viewHistory.pop(),false);}
function pageHeader(title,actionHTML=''){
  return`<div class="page-header">${viewHistory.length?`<button class="btn-back" onclick="goBack()">← Back</button>`:''}<div class="page-title">${title}</div>${actionHTML?`<div class="page-actions">${actionHTML}</div>`:''}</div>`;
}

// ── GREETING ──────────────────────────────────────────────
function getGreeting(){
  const h=new Date().getHours(),n=currentUser.fullName.split(' ')[0];
  if(h<12)return`Good Morning, ${n}! 🌅`;if(h<18)return`Good Afternoon, ${n}! ☀️`;return`Good Evening, ${n}! 🌙`;
}

// ── COLORFUL STAT CARDS HELPER ────────────────────────────
function statCard(icon,label,value,sub,colorClass){
  return`<div class="stat-card ${colorClass}"><div class="sc-icon">${icon}</div><div class="sc-label">${label}</div><div class="sc-value">${value}</div>${sub?`<div class="sc-sub">${sub}</div>`:''}</div>`;
}

function renderDashboard(){

  const totalPaid=DB.payments.reduce((s,p)=>s+p.amount,0);
  const nm=new Date(),thisM=nm.getMonth(),thisY=nm.getFullYear();

      +statCard('📈','This Week',myTodayQty,'crowns today · '+myMonthlyAmt.toLocaleString()+' AFG','sc-orange')

      +statCard('📊','System Outstanding',(totalEarned-totalPaid).toLocaleString()+' AFG','across all users','sc-red');

  }else{
    stats=statCard('👑','Total Orders',myD.reduce((s,d)=>s+d.quantity,0),'crowns total','sc-blue')
      +statCard('💵','Unpaid Balance',(myEarned-myPaid).toLocaleString()+' AFG',myEarned.toLocaleString()+' earned total','sc-green')
      +statCard('📅','This Month',myMonthlyAmt.toLocaleString()+' AFG',myMonthly.length+' orders','sc-purple')
      +statCard('📈','This Week',myTodayQty,'crowns today','sc-orange');
  }

  const qaItems=r==='owner'?[
    {icon:'✏️',label:'Add Design',action:"openAddDesign()"},{icon:'📋',label:'My Designs',action:"navigateTo('myDesigns')"},
    {icon:'💰',label:'My Earnings',action:"navigateTo('myEarnings')"},{icon:'👤',label:'Add User',action:"openAddUser()"},
    {icon:'👥',label:'Manage Users',action:"navigateTo('users')"},{icon:'💳',label:'Record Payment',action:"openAddPayment()"},
    {icon:'📊',label:'Reports',action:"navigateTo('reports')"},{icon:'🔍',label:'Audit Log',action:"navigateTo('audit')"}
  ]:r==='admin'?[
    {icon:'✏️',label:'Add Design',action:"openAddDesign()"},{icon:'👤',label:'Add User',action:"openAddUser()"},
    {icon:'💳',label:'Record Payment',action:"openAddPayment()"},{icon:'📊',label:'Reports',action:"navigateTo('reports')"},
    {icon:'✅',label:'Approvals',action:"navigateTo('approvals')"}
  ]:[
    {icon:'✏️',label:'Add Design',action:"openAddDesign()"},{icon:'📋',label:'My Designs',action:"navigateTo('myDesigns')"},
    {icon:'💰',label:'My Earnings',action:"navigateTo('myEarnings')"},{icon:'📊',label:'Reports',action:"navigateTo('reports')"}
  ];

  const teamPanel=(r==='owner'||r==='admin')?`<div><div class="card" style="position:sticky;top:72px">
    <div class="card-title">👥 Team</div>

      const mt=DB.designs.filter(d=>d.userId===m.id&&new Date(d.date).toDateString()===today&&d.status!=='deleted').reduce((s,d)=>s+d.quantity,0);
      return`<div class="team-item" onclick="openUserProfile('${m.id}')"><div><div class="ti-name">${m.fullName}</div><div class="ti-role">${m.role}</div></div><div style="text-align:right"><span class="status-pill pill-${m.status==='active'?'active':m.status==='pending'?'pending':'suspended'}">${m.status}</span><div style="font-size:10px;color:var(--dim);margin-top:3px">${mt} today</div></div></div>`;

          ${recent.length?recent.map(d=>`<tr><td><span class="td-code">${d.code}</span></td><td>${d.designType}</td><td>${d.quantity}</td><td style="color:var(--gold)">${d.totalValue.toLocaleString()} AFG</td><td>${fmtDate(d.date)}</td></tr>`).join(''):'<tr><td colspan="5" style="text-align:center;color:var(--dim);padding:20px">No designs yet</td></tr>'}
          </tbody></table></div>
        </div>

function toggleUserStatus(id){const u=DB.users.find(x=>x.id===id);if(!u)return;u.status=u.status==='active'?'suspended':'active';addAudit('USER_STATUS',`${u.fullName} → ${u.status}`);saveDB();renderUsers();}
function deleteUser(id){if(!confirm('Delete user?'))return;DB.users=DB.users.filter(u=>u.id!==id);addAudit('USER_DELETED',id);saveDB();renderUsers();}

    <div class="stats-grid" style="margin:14px 0">
      ${statCard('📋','Total Crowns',uD.reduce((s,d)=>s+d.quantity,0),'','sc-blue')}
      ${statCard('💵','Earned',earned.toLocaleString(),'AFG','sc-green')}
      ${statCard('✅','Paid',paid.toLocaleString(),'AFG','sc-purple')}

    [{label:'Close',cls:'btn-secondary',action:'closeModal()'},
     ...(currentUser.role==='owner'?[{label:'Save Name',cls:'btn-primary',action:`saveUserName('${id}')`}]:[])]);

function saveUserName(id){const u=DB.users.find(x=>x.id===id);const n=document.getElementById('ep-name')?.value?.trim();if(u&&n){u.fullName=n;addAudit('USER_EDITED',id);saveDB();closeModal();renderUsers();}}

// ── ADD DESIGN ────────────────────────────────────────────
function openAddDesign(){
  const users=currentUser.role==='user'?[currentUser]:DB.users.filter(u=>u.status==='active');
  showModal('✏️ Add Design Record',`
    <div class="grid-2">
      <div class="fg"><label>Design Code</label><input id="ad-code" placeholder="e.g. CR-001"/></div>
      <div class="fg"><label>Design Type</label><select id="ad-type"><option>Crown</option><option>Bridge</option><option>Veneer</option><option>Inlay</option><option>Onlay</option><option>Other</option></select></div>
      <div class="fg"><label>Number of Crowns</label><input type="number" id="ad-qty" min="1" value="1" oninput="calcTotal()"/></div>
      <div class="fg"><label>Unit Rate (AFG)</label><input type="number" id="ad-rate" value="${DB.settings.designRate}" oninput="calcTotal()"/></div>
      <div class="fg"><label>Total Value</label><input id="ad-total" readonly style="color:var(--gold);font-weight:700"/></div>
      <div class="fg"><label>Date</label><input type="date" id="ad-date" value="${new Date().toISOString().slice(0,10)}"/></div>
    </div>
    ${currentUser.role!=='user'?`<div class="fg"><label>Designer</label><select id="ad-user">${users.map(u=>`<option value="${u.id}" ${u.id===currentUser.id?'selected':''}>${u.fullName}</option>`).join('')}</select></div>`:''}`,
    [{label:'Cancel',cls:'btn-secondary',action:'closeModal()'},{label:'Save Design',cls:'btn-primary',action:'saveDesign()'}]);
  calcTotal();
}
function calcTotal(){const q=parseFloat(document.getElementById('ad-qty')?.value)||0,r=parseFloat(document.getElementById('ad-rate')?.value)||0;const t=document.getElementById('ad-total');if(t)t.value=(q*r).toLocaleString()+' AFG';}
function saveDesign(){
  const code=document.getElementById('ad-code').value.trim();
  const type=document.getElementById('ad-type').value;
  const qty=parseInt(document.getElementById('ad-qty').value)||0;
  const rate=parseFloat(document.getElementById('ad-rate').value)||0;
  const date=document.getElementById('ad-date').value;
  const userId=currentUser.role!=='user'?(document.getElementById('ad-user')?.value||currentUser.id):currentUser.id;
  if(!code||qty<1||!date){alert('Please fill all fields.');return;}
  DB.designs.push({id:uid(),code,designType:type,quantity:qty,unitRate:rate,totalValue:qty*rate,date,userId,status:'active',createdAt:new Date().toISOString(),uploadedFile:null});
  addAudit('DESIGN_ADDED',`${code} (${qty} crowns, ${qty*rate} AFG)`);saveDB();closeModal();
  if(currentUser.role==='user')renderMyDesigns();else renderAllDesigns();
}

  const users=DB.users.filter(u=>u.role!=='owner'||u.id===currentUser.id);
  showModal('💳 Record Payment',`

    [{label:'Cancel',cls:'btn-secondary',action:'closeModal()'},{label:'Record Payment',cls:'btn-success',action:'savePayment()'}]);

function savePayment(){
  const userId=document.getElementById('ap-user').value;
  const amount=parseFloat(document.getElementById('ap-amount').value)||0;
  const date=document.getElementById('ap-date').value;
  const notes=document.getElementById('ap-notes').value.trim();
  if(!userId||amount<=0||!date){alert('Please fill all fields.');return;}
  const u=DB.users.find(x=>x.id===userId);
  DB.payments.push({id:uid(),userId,amount,date,notes,createdBy:currentUser.id,createdAt:new Date().toISOString()});
  addAudit('PAYMENT_ADDED',`${amount} AFG for ${u?u.fullName:'?'}`);saveDB();closeModal();renderPayments();
}

// ── ADD USER (no license, pending approval) ───────────────
function openAddUser(){
  if(currentUser.role==='user')return;
  showModal('👤 Add New User',`
    <div class="grid-2">
      <div class="fg"><label>Full Name</label><input id="au-name" placeholder="Full name"/></div>
      <div class="fg"><label>Username</label><input id="au-username" placeholder="Username or email"/></div>
      <div class="fg"><label>Password</label><input type="password" id="au-password" placeholder="Password"/></div>
      <div class="fg"><label>Role</label><select id="au-role">${currentUser.role==='owner'?'<option value="admin">Admin</option>':''}<option value="user">Designer</option></select></div>
    </div>
    <div class="fg"><label>Activate Immediately?</label><select id="au-status"><option value="active">Yes – Active</option><option value="pending">No – Pending Approval</option></select></div>`,
    [{label:'Cancel',cls:'btn-secondary',action:'closeModal()'},{label:'Create User',cls:'btn-primary',action:'saveUser()'}]);
}
function saveUser(){
  const name=document.getElementById('au-name').value.trim();
  const username=document.getElementById('au-username').value.trim();
  const password=document.getElementById('au-password').value.trim();
  const role=document.getElementById('au-role').value;
  const status=document.getElementById('au-status').value;
  if(!name||!username||!password){alert('Please fill all fields.');return;}
  if(DB.users.find(u=>u.username===username)){alert('Username already exists.');return;}
  DB.users.push({id:uid(),fullName:name,username,password,role,status,joinDate:new Date().toISOString().slice(0,10),lastLogin:null});
  addAudit('USER_CREATED',`${role} "${name}" (${status})`);saveDB();closeModal();
  showModal('✅ User Created',`
    <div class="alert alert-success">User <strong>${name}</strong> created${status==='pending'?' and marked as pending approval.':'!'}</div>
    <div class="fg"><label>Username</label><input value="${username}" readonly/></div>
    <div class="fg"><label>Password</label><input value="${password}" readonly/></div>`,
    [{label:'Done',cls:'btn-primary',action:'closeModal()'}]);
  renderUsers();
}

// ── DELETE REQUEST ────────────────────────────────────────
function requestDelete(id){
  if(currentUser.role!=='user'){deleteDesignAdmin(id);return;}
  const d=DB.designs.find(x=>x.id===id);if(!d)return;
  DB.deletionRequests.push({id:uid(),designId:id,requestedBy:currentUser.id,requestedAt:new Date().toISOString(),status:'pending'});
  addAudit('DELETION_REQUESTED',`Delete request for ${d.code}`);saveDB();alert('Deletion request submitted for review.');renderMyDesigns();
}

// ── APPROVALS ─────────────────────────────────────────────
function renderApprovals(){
  const pending=DB.deletionRequests.filter(r=>r.status==='pending');
  const pendingUsers=DB.users.filter(u=>u.status==='pending');
  document.getElementById('mainContent').innerHTML=
    pageHeader('✅ Approvals')+`
    ${pendingUsers.length?`<div class="card"><div class="card-title">👤 Pending User Approvals</div>
      <div class="table-wrap"><table><thead><tr><th>Name</th><th>Username</th><th>Role</th><th>Joined</th><th>Actions</th></tr></thead>
      <tbody>${pendingUsers.map(u=>`<tr><td><strong>${u.fullName}</strong></td><td>${u.username}</td><td><span class="badge badge-${u.role}">${u.role}</span></td><td>${fmtDate(u.joinDate)}</td>
      <td style="display:flex;gap:6px"><button class="btn btn-success btn-sm" onclick="approveUser('${u.id}')">✅ Approve</button><button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}')">❌ Reject</button></td></tr>`).join('')}</tbody></table></div></div>`:''}
    <div class="card"><div class="card-title">🗑️ Deletion Requests</div>
      ${pending.length?`<div class="table-wrap"><table><thead><tr><th>Design Code</th><th>Requested By</th><th>Date</th><th>Actions</th></tr></thead>
      <tbody>${pending.map(r=>{const d=DB.designs.find(x=>x.id===r.designId),u=DB.users.find(x=>x.id===r.requestedBy);
        return`<tr><td><span class="td-code">${d?d.code:'?'}</span></td><td>${u?u.fullName:'?'}</td><td>${fmtTime(r.requestedAt)}</td>
        <td style="display:flex;gap:6px"><button class="btn btn-success btn-sm" onclick="approveDelete('${r.id}')">✅ Approve</button><button class="btn btn-danger btn-sm" onclick="rejectDelete('${r.id}')">❌ Reject</button></td></tr>`;
      }).join('')}</tbody></table></div>`:'<p style="text-align:center;color:var(--dim);padding:20px">No pending deletion requests</p>'}
    </div>`;
}
function approveDelete(rid){const r=DB.deletionRequests.find(x=>x.id===rid);if(!r)return;const d=DB.designs.find(x=>x.id===r.designId);if(d)d.status='deleted';r.status='approved';addAudit('DELETION_APPROVED',d?d.code:'?');saveDB();renderApprovals();}
function rejectDelete(rid){const r=DB.deletionRequests.find(x=>x.id===rid);if(r){r.status='rejected';saveDB();renderApprovals();}}

// ── REPORTS ───────────────────────────────────────────────
function renderReports(){
  const uid_=currentUser.id,isAdmin=currentUser.role!=='user';
  const designs=isAdmin?DB.designs.filter(d=>d.status!=='deleted'):DB.designs.filter(d=>d.userId===uid_&&d.status!=='deleted');
  const wk=new Date();wk.setDate(wk.getDate()-7);
  const mo=new Date();mo.setMonth(mo.getMonth()-1);
  const weekly=designs.filter(d=>new Date(d.date)>=wk);
  const monthly=designs.filter(d=>new Date(d.date)>=mo);
  document.getElementById('mainContent').innerHTML=
    pageHeader('📊 Reports')+`
    <div class="stats-grid">
      ${statCard('📋','Weekly Crowns',weekly.reduce((s,d)=>s+d.quantity,0),'last 7 days','sc-blue')}
      ${statCard('💵','Weekly Earnings',weekly.reduce((s,d)=>s+d.totalValue,0).toLocaleString()+' AFG','','sc-green')}
      ${statCard('📅','Monthly Crowns',monthly.reduce((s,d)=>s+d.quantity,0),'last 30 days','sc-purple')}
      ${statCard('💰','Monthly Earnings',monthly.reduce((s,d)=>s+d.totalValue,0).toLocaleString()+' AFG','','sc-orange')}
    </div>
    <div class="card"><div class="card-title">📥 Export</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-gold" onclick="exportReport('weekly')">📥 Weekly HTML Report</button>
        <button class="btn btn-secondary" onclick="exportReport('monthly')">📥 Monthly HTML Report</button>
      </div>
    </div>`;
}
function exportReport(period){
  const uid_=currentUser.id,isAdmin=currentUser.role!=='user';
  const cutoff=new Date();if(period==='weekly')cutoff.setDate(cutoff.getDate()-7);else cutoff.setMonth(cutoff.getMonth()-1);
  const designs=(isAdmin?DB.designs:DB.designs.filter(d=>d.userId===uid_)).filter(d=>d.status!=='deleted'&&new Date(d.date)>=cutoff);
  const tC=designs.reduce((s,d)=>s+d.quantity,0),tA=designs.reduce((s,d)=>s+d.totalValue,0);
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Crown Tracker Report</title>
  <style>body{font-family:system-ui,sans-serif;background:#0d0f14;color:#e8ecf4;margin:0;padding:24px}h1{color:#4f8ef7}p{color:#8892a4;font-size:13px;margin-bottom:20px}.s{display:flex;gap:14px;margin-bottom:24px;flex-wrap:wrap}.sc{padding:18px 22px;border-radius:14px;min-width:140px;color:#fff}.sv{font-size:26px;font-weight:900}.sl{font-size:11px;opacity:.8;margin-top:4px;text-transform:uppercase;letter-spacing:1px}.b{background:linear-gradient(135deg,#3a6fd8,#2255c0)}.g{background:linear-gradient(135deg,#1a9e6e,#0e7a52)}.o{background:linear-gradient(135deg,#d4620a,#b04f06)}table{width:100%;border-collapse:collapse;background:#181c27;border-radius:10px;overflow:hidden}th{background:#13161e;padding:11px;text-align:left;font-size:11px;color:#4f8ef7;letter-spacing:1px;text-transform:uppercase}td{padding:11px;border-bottom:1px solid #252a3a;font-size:13px}footer{margin-top:24px;text-align:center;color:#4a5268;font-size:11px}</style></head>
  <body><h1>🦷 Crown Tracker</h1><p>${period} Report | ${new Date().toLocaleString()}</p>
  <div class="s"><div class="sc b"><div class="sv">${tC}</div><div class="sl">Total Crowns</div></div><div class="sc g"><div class="sv">${designs.length}</div><div class="sl">Orders</div></div><div class="sc o"><div class="sv">${tA.toLocaleString()} AFG</div><div class="sl">Total Payable</div></div></div>
  <table><thead><tr><th>Code</th><th>Type</th><th>Crowns</th><th>Rate</th><th>Total</th><th>Date</th></tr></thead>
  <tbody>${designs.map(d=>`<tr><td>${d.code}</td><td>${d.designType}</td><td>${d.quantity}</td><td>${d.unitRate} AFG</td><td style="color:#f5c842">${d.totalValue.toLocaleString()} AFG</td><td>${fmtDate(d.date)}</td></tr>`).join('')||'<tr><td colspan="6" style="text-align:center;color:#4a5268">No records</td></tr>'}</tbody></table>
  <footer>Developed by Marvan Yaftally | MKY | Crown Tracker v2.0</footer></body></html>`;
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([html],{type:'text/html'}));
  a.download=`crown-tracker-${period}-${new Date().toISOString().slice(0,10)}.html`;a.click();
}

// ── SETTINGS ──────────────────────────────────────────────
function renderSettings(){
  if(currentUser.role==='user'){navigateTo('dashboard');return;}
  document.getElementById('mainContent').innerHTML=
    pageHeader('⚙️ System Settings')+`
    <div class="card"><div class="card-title">💲 Design Rate</div>
      <div class="fg" style="max-width:280px"><label>Rate per Crown (AFG)</label><input type="number" id="sr-rate" value="${DB.settings.designRate}" min="1"/></div>
      <button class="btn btn-primary" onclick="saveSettings()">Save Rate</button>
    </div>
    ${currentUser.role==='owner'?`<div class="card"><div class="card-title">🔐 Update Credentials</div>
      <div class="grid-2">
        <div class="fg"><label>New Username / Email</label><input id="oc-user" placeholder="${currentUser.username}"/></div>
        <div class="fg"><label>New Password</label><input type="password" id="oc-pass" placeholder="New password"/></div>
      </div>
      <button class="btn btn-primary" onclick="changeOwnerCreds()">Update</button>
    </div>`:''}`;
}
function saveSettings(){const r=parseFloat(document.getElementById('sr-rate').value)||40;DB.settings.designRate=r;addAudit('RATE_CHANGED',`${r} AFG`);saveDB();alert('Rate updated!');}
function changeOwnerCreds(){
  const u=document.getElementById('oc-user').value.trim(),p=document.getElementById('oc-pass').value.trim();
  const owner=DB.users.find(x=>x.role==='owner');
  if(owner){if(u)owner.username=u;if(p)owner.password=p;if(u)currentUser.username=u;addAudit('CREDENTIALS_CHANGED','Owner credentials updated');saveDB();renderTopBar();alert('Updated!');}
}

// ── AUDIT ─────────────────────────────────────────────────
function renderAudit(){
  if(currentUser.role!=='owner'){navigateTo('dashboard');return;}
  document.getElementById('mainContent').innerHTML=
    pageHeader('🔍 Audit Log')+`
    <div class="card">${DB.auditLog.length?DB.auditLog.map(l=>`<div class="log-entry">
      <div class="log-time">${fmtTime(l.timestamp)} · <span class="badge badge-${l.role}">${l.role}</span> · ${l.user}</div>
      <div class="log-action">${l.action}</div>
      ${l.details?`<div style="color:var(--muted);font-size:10px;margin-top:1px">${l.details}</div>`:''}
    </div>`).join(''):'<p style="text-align:center;color:var(--dim);padding:28px">No audit logs yet</p>'}
    </div>`;
}

// ── MODAL ─────────────────────────────────────────────────
function showModal(title,body,buttons=[]){
  document.getElementById('modalTitle').innerHTML=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalFooter').innerHTML=buttons.map(b=>`<button class="btn ${b.cls}" onclick="${b.action}">${b.label}</button>`).join('');
  document.getElementById('modalOverlay').classList.remove('hidden');
}
function closeModal(){document.getElementById('modalOverlay').classList.add('hidden');}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

// ── SW REGISTER ───────────────────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{navigator.serviceWorker.register('service-worker.js').then(r=>console.log('SW registered',r)).catch(e=>console.log('SW error',e));});
}

// ── INIT ──────────────────────────────────────────────────
(function init(){if(restoreSession())showApp();})();
</script>
